<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beogradska heraldika - kontakt</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/kontakt.css">
    <link rel="shortcut icon" href="img/Ocilo.ico" type="image/x-icon" />
    <script src="js/index.js"></script>
</head>
<body>
    <header>
        <a href="index.html"><img src="img/beograd-osnovni.png" alt="Grb Beograda" class="glavni-grb"></a>
            <div class="desni">
                <div class="naslov">
                    <h1>Beogradska heraldika</h1>
                </div>
        
                <div class="meni">
                    <ul class="meni-lista">
                        <li class="meni-dugme"><a href="index.html" class="meni-link">Početna</a></li>
                        <li class="meni-dugme"><a href="opstine.html" class="meni-link">Opštine</a></li>
                        <li class="meni-dugme aktivan"><a href="#" class="meni-link">Kontakt</a></li>
                    </ul>
                </div>
            </div>
    </header>
    <main>

        <h1 class="naslov-glavna">Kontakt</h1>
        <br>
        <div class="forma">
            <form action="">
                <label for="email" class="kontakt-label">E-mail:</label>
                <input type="email" name="email" id="" class="kontakt-input" placeholder="Vaš e-mail">
                <br>
                <br>
                <label for="area" class="kontakt-label">Komentar:</label>
                <textarea name="area" id="" rows="10" cols="40" class="kontakt-input" placeholder="Vaš komentar"></textarea><br><br>
                <input type="submit" value="Pošalji komentar">
            </form>
        </div>
        

    </main>
    <footer>
        <img src="img/beograd-osnovni.png" alt="Grb Beograda" class="footer-grb">
        <p class="footer-par">&copy; Beogradska heraldika 2024 - Nikola i Luka Stefanović</p>
    </footer>
</body>
</html>
